default:
  image: ${F5_CI_IMAGE}

stages:
  - lint
  - test_restsh

lint_job:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push'
  tags:
    - ${F5_ENV}_lint
  stage: lint
  script:
    - ./lint.sh

test_restsh_job:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push'
  tags:
    - ${F5_ENV}_lint
  stage: test_restsh
  script:
    - ./test/test.sh -g restsh
