name: lint

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: install linters
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck
    - name: lint js css html lua
      run: ./lint.sh
